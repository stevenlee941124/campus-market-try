<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>賣家管理後台</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <header>
        <h2>興大二手交易</h2>
        <nav>
            <a href="/">回首頁</a>
            <span style="color: white; margin-left: 20px;">👤 帳號：{{ user.sub }}</span>
            <a href="/auth/logout" style="margin-left: 15px; color: #ffcccc;">登出</a>
        </nav>
    </header>

    <div class="container">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h2>👨‍💼 我的刊登物品</h2>
            <a href="/post"><button>+ 刊登新商品</button></a>
        </div>

        <div class="product-grid">
            {% for product in my_products %}
            <div class="product-card">
                <img src="{{ product.image }}" style="width: 100%; height: 150px; object-fit: cover;">
                <h3>{{ product.name }}</h3>
                <p class="price">${{ product.price | int }}</p>
                <div style="display: flex; gap: 10px; margin-top: 15px;">
                <a href="/products/{{ product.id }}/edit" style="flex: 1; text-decoration: none;">
                    <button style="width: 100%; background: #3498db; color: white; border: none; padding: 8px; border-radius: 4px; cursor: pointer;">編輯</button>
                </a>

                <form action="/products/{{ product.id }}/delete" method="POST" style="flex: 1;" onsubmit="return confirm('確定要下架此商品嗎？');">
                    <button type="submit" style="width: 100%; background: #e74c3c; color: white; border: none; padding: 8px; border-radius: 4px; cursor: pointer;">下架</button>
                </form>
            </div>
            </div>
            {% else %}
            <p>您目前還沒有刊登任何商品。</p>
            {% endfor %}
        </div>
    </div>
</body>
</html>
