<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>聯絡我們 - 校園二手交易平台</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <header>
        <h2>校園二手交易平台</h2>
        <nav><a href="/">回首頁</a></nav>
    </header>
    <div class="container">
        <h2>✉️ 聯絡我們與意見回饋</h2>
        <form action="/feedback" method="POST">
            <div class="form-group">
                <label>您的姓名：</label>
                <input type="text" name="name" required>
            </div>
            <div class="form-group">
                <label>Email：</label>
                <input type="email" name="email" required>
            </div>
            <div class="form-group">
                <label>意見內容：</label>
                <textarea name="message" rows="5" required placeholder="請輸入您的建議或問題回報..."></textarea>
            </div>
            <button type="submit">送出回饋</button>
        </form>
    </div>
</body>
</html>
